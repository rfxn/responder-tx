# Standalone Worker that hosts the PushRegistry Durable Object for web-push device alerts (P1).
# Deploy separately from the Pages site:  cd workers/push-alerts && npx -y wrangler@3.114.0 deploy
# The Pages project (responder-tx) binds to this DO via a `PUSH` Durable Object binding with
# script_name = "responder-push-alerts" (set in the Pages dashboard — see README.md).
# This file does NOT affect `wrangler pages deploy`.

name = "responder-push-alerts"
main = "push-alerts.js"
compatibility_date = "2025-06-01"

# Not publicly routable: the DO is reached only through the Pages PUSH binding and its own cron.
workers_dev = false

# */5 evaluator: poll api.weather.gov for new Flash Flood Emergencies in the event AO.
[triggers]
crons = ["*/5 * * * *"]

# Public VAPID key (not a secret; served to clients via /api/push/status). The private key is a
# Worker secret (VAPID_PRIVATE_KEY, `wrangler secret put`) and never exists in the repo.
[vars]
VAPID_PUBLIC_KEY = "BCQ51XXwF0kIVqq2eqX7Gk0dI_4gO9KtgIK8wsRzSfj6NIls-OcluKsnq2g0VGpEViOrnNiAMmjn9BddMJPLhKs"

[[durable_objects.bindings]]
name = "PUSH"
class_name = "PushRegistry"

# SQLite-backed DO class — available on the Workers free plan (no paid entitlement required).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PushRegistry"]
