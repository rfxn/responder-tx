name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to keep the queue lean.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax-check app scripts (js/*.js, excl. vendor)
        run: |
          for f in js/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

      # Suite steps run with !cancelled() so one red suite never hides the others.
      - name: Unit tests (node:test)
        if: ${{ !cancelled() }}
        run: node --test tests/

      - name: Chat-poll durability tests
        if: ${{ !cancelled() }}
        run: bash tests/chat-poll.test.sh

      - name: Server write-gate tests
        if: ${{ !cancelled() }}
        run: python3 tests/server-gate.test.py

      - name: Release-cycle sanity checks
        if: ${{ !cancelled() }}
        run: bash scripts/cycle-check.sh
