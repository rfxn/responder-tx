<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200" role="img" aria-label="Responder TX — Texas Hill Country live flood operating picture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2f6"/>
    </linearGradient>
    <linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a78d6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2a78d6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="10" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="10" fill="none" stroke="#d6dce3" stroke-width="1"/>

  <!-- emblem: flood water + location drop (from icon.svg) -->
  <g transform="translate(34,34) scale(0.105)">
    <path d="M48 356c52-42 104-42 156 0s104 42 156 0 84-34 104-16v124H48z" fill="#2a78d6"/>
    <path d="M256 76a92 92 0 0 1 92 92c0 68-92 162-92 162s-92-94-92-162a92 92 0 0 1 92-92z" fill="#c0392b"/>
    <circle cx="256" cy="168" r="38" fill="#fff"/>
  </g>

  <!-- wordmark + taglines -->
  <text x="104" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#1f2328">Responder TX</text>
  <text x="106" y="100" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4b5563">Texas Hill Country &#8212; live flood operating picture</text>
  <text x="106" y="122" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#6b7280" letter-spacing="0.2">honest by construction &#183; no account &#183; no tracking &#183; call 911 for emergencies</text>

  <line x1="34" y1="138" x2="866" y2="138" stroke="#000000" stroke-width="1" opacity="0.08"/>

  <!-- hydrograph: observed stage rising across flood-stage thresholds into a forecast crest -->
  <g font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">
    <!-- flood-category threshold lines (NWS AHPS palette, light-theme app colors) -->
    <line x1="40" y1="178" x2="830" y2="178" stroke="#a97800" stroke-width="1" stroke-dasharray="4,4" opacity="0.7"/>
    <line x1="40" y1="170" x2="830" y2="170" stroke="#c9531f" stroke-width="1" stroke-dasharray="4,4" opacity="0.7"/>
    <line x1="40" y1="160" x2="830" y2="160" stroke="#bf2e2e" stroke-width="1" stroke-dasharray="4,4" opacity="0.75"/>
    <line x1="40" y1="150" x2="830" y2="150" stroke="#8b2fd6" stroke-width="1" stroke-dasharray="4,4" opacity="0.75"/>
    <text x="838" y="181" font-size="9" fill="#a97800">ACT</text>
    <text x="838" y="173" font-size="9" fill="#c9531f">MIN</text>
    <text x="838" y="163" font-size="9" fill="#bf2e2e">MOD</text>
    <text x="838" y="153" font-size="9" fill="#8b2fd6">MAJ</text>

    <!-- observed area -->
    <polygon points="40,186 100,184 150,182 200,179 250,176 300,171 340,166 380,160 410,155 440,150 470,146 470,186"
             fill="url(#wfill)"/>
    <!-- observed stage (solid) -->
    <polyline points="40,185 100,184 150,182 200,179 250,176 300,171 340,166 380,160 410,155 440,150 470,146"
              fill="none" stroke="#2a78d6" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- forecast continuation (dashed, projected recession) -->
    <polyline points="470,146 510,149 560,155 620,163 690,171 760,178 830,183"
              fill="none" stroke="#6aa0dc" stroke-width="2" stroke-dasharray="5,4" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- NOW marker -->
    <line x1="470" y1="146" x2="470" y2="186" stroke="#1f2328" stroke-width="1" stroke-dasharray="2,3" opacity="0.45"/>
    <circle cx="470" cy="146" r="3" fill="#2a78d6"/>
    <text x="470" y="143" font-size="9" fill="#1f2328" text-anchor="middle">NOW</text>

    <text x="150" y="145" font-size="9" fill="#3d6ea3">observed</text>
    <text x="700" y="145" font-size="9" fill="#3d6ea3">forecast</text>
  </g>
</svg>
