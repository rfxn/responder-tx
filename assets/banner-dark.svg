<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200" role="img" aria-label="Responder TX — Texas Hill Country live flood operating picture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1f1d"/>
      <stop offset="100%" stop-color="#0e0e0d"/>
    </linearGradient>
    <linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3987e5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3987e5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="10" fill="url(#bg)"/>

  <!-- emblem: flood water + location drop (from icon.svg) -->
  <g transform="translate(34,34) scale(0.105)">
    <path d="M48 356c52-42 104-42 156 0s104 42 156 0 84-34 104-16v124H48z" fill="#3987e5"/>
    <path d="M256 76a92 92 0 0 1 92 92c0 68-92 162-92 162s-92-94-92-162a92 92 0 0 1 92-92z" fill="#d03b3b"/>
    <circle cx="256" cy="168" r="38" fill="#fff"/>
  </g>

  <!-- wordmark + taglines -->
  <text x="104" y="74" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" fill="#f4f4f2">Responder TX</text>
  <text x="106" y="100" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#b3ada6">Texas Hill Country &#8212; live flood operating picture</text>
  <text x="106" y="122" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#857f78" letter-spacing="0.2">honest by construction &#183; no account &#183; no tracking &#183; call 911 for emergencies</text>

  <line x1="34" y1="138" x2="866" y2="138" stroke="#ffffff" stroke-width="1" opacity="0.10"/>

  <!-- hydrograph: observed stage rising across flood-stage thresholds into a forecast crest -->
  <g font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">
    <!-- flood-category threshold lines (NWS AHPS palette, exact app colors) -->
    <line x1="40" y1="178" x2="830" y2="178" stroke="#fab219" stroke-width="1" stroke-dasharray="4,4" opacity="0.55"/>
    <line x1="40" y1="170" x2="830" y2="170" stroke="#ec835a" stroke-width="1" stroke-dasharray="4,4" opacity="0.55"/>
    <line x1="40" y1="160" x2="830" y2="160" stroke="#d03b3b" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <line x1="40" y1="150" x2="830" y2="150" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="838" y="181" font-size="9" fill="#fab219">ACT</text>
    <text x="838" y="173" font-size="9" fill="#ec835a">MIN</text>
    <text x="838" y="163" font-size="9" fill="#d03b3b">MOD</text>
    <text x="838" y="153" font-size="9" fill="#a855f7">MAJ</text>

    <!-- observed area -->
    <polygon points="40,186 100,184 150,182 200,179 250,176 300,171 340,166 380,160 410,155 440,150 470,146 470,186"
             fill="url(#wfill)"/>
    <!-- observed stage (solid) -->
    <polyline points="40,185 100,184 150,182 200,179 250,176 300,171 340,166 380,160 410,155 440,150 470,146"
              fill="none" stroke="#3987e5" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- forecast continuation (dashed, projected recession) -->
    <polyline points="470,146 510,149 560,155 620,163 690,171 760,178 830,183"
              fill="none" stroke="#7fb3ec" stroke-width="2" stroke-dasharray="5,4" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- NOW marker -->
    <line x1="470" y1="146" x2="470" y2="186" stroke="#f4f4f2" stroke-width="1" stroke-dasharray="2,3" opacity="0.5"/>
    <circle cx="470" cy="146" r="3" fill="#3987e5"/>
    <text x="470" y="143" font-size="9" fill="#e9e7e3" text-anchor="middle">NOW</text>

    <text x="150" y="145" font-size="9" fill="#8fb3dd">observed</text>
    <text x="700" y="145" font-size="9" fill="#8fb3dd">forecast</text>
  </g>
</svg>
